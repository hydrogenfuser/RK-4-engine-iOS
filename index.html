<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Orbital Simulator - THE FIX</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #020205; touch-action: none; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script>
    // --- SETTINGS ---
    const G_MU = 800000.0;         
    const R_PLANET = 55.0;         
    const R_ATMOS = 85.0;          
    const MOON_MU = 95000.0;       
    const MOON_RADIUS = 18.0;
    const MOON_ORBIT_R = 2700.0;   
    const MOON_ORBIT_SPEED = 0.006; 
    const MOON_SOI = 450.0;        

    let r, v, timeSim = 0, camPos, zoom = 0.15;
    let warpLevels = [0, 1, 5, 20, 100, 500], warpIndex = 1;
    let fragments = [], reentryTrail = [];
    let isCrashed = false;
    let traj = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      r = createVector(0, -200);
      v = createVector(sqrt(G_MU / r.mag()) + 2.5, 0); 
      camPos = createVector(0, 0);
    }

    function getAcc(pos, vel, t, isPrediction = false) {
      let acc = createVector(0, 0);
      let rMagSq = pos.magSq();
      let rMag = sqrt(rMagSq);
      
      // Earth Gravity
      if (rMag < R_PLANET) acc.add(p5.Vector.mult(pos, -G_MU / (R_PLANET**3)));
      else acc.add(p5.Vector.mult(pos, -G_MU / (rMagSq * rMag)));

      // Atmospheric Drag (Earth only)
      if (rMag < R_ATMOS && rMag > R_PLANET) {
        let rho = exp(-(rMag - R_PLANET) / 8.0) * 0.02;
        acc.add(p5.Vector.mult(vel, -0.5 * rho * vel.mag()));
      }

      // Moon Gravity
      let mPos = createVector(cos(t * MOON_ORBIT_SPEED) * MOON_ORBIT_R, sin(t * MOON_ORBIT_SPEED) * MOON_ORBIT_R);
      let rToM = p5.Vector.sub(mPos, pos);
      let dM = rToM.mag();
      if (dM < MOON_RADIUS) acc.add(p5.Vector.mult(rToM, MOON_MU / (MOON_RADIUS**3)));
      else acc.add(p5.Vector.mult(rToM, MOON_MU / (dM**3)));

      return acc;
    }

    function rk4Step(pos, vel, t, dt) {
      let k1v = getAcc(pos, vel, t), k1r = vel.copy();
      let k2v = getAcc(p5.Vector.add(pos, p5.Vector.mult(k1r, dt/2)), p5.Vector.add(vel, p5.Vector.mult(k1v, dt/2)), t + dt/2);
      let k2r = p5.Vector.add(vel, p5.Vector.mult(k1v, dt/2));
      let k3v = getAcc(p5.Vector.add(pos, p5.Vector.mult(k2r, dt/2)), p5.Vector.add(vel, p5.Vector.mult(k2v, dt/2)), t + dt/2);
      let k3r = p5.Vector.add(vel, p5.Vector.mult(k2v, dt/2));
      let k4v = getAcc(p5.Vector.add(pos, p5.Vector.mult(k3r, dt)), p5.Vector.add(vel, p5.Vector.mult(k3v, dt)), t + dt);
      let k4r = p5.Vector.add(vel, p5.Vector.mult(k3v, dt));
      return {
        r: p5.Vector.add(pos, p5.Vector.mult(p5.Vector.add(k1r, p5.Vector.mult(k2r, 2)).add(p5.Vector.mult(k3r, 2)).add(k4r), dt/6)),
        v: p5.Vector.add(vel, p5.Vector.mult(p5.Vector.add(k1v, p5.Vector.mult(k2v, 2)).add(p5.Vector.mult(k3v, 2)).add(k4v), dt/6))
      };
    }

    function explode(pos, vel) {
      isCrashed = true;
      for(let i = 0; i < 400; i++) {
        let angle = random(TWO_PI);
        let force = random(10, 65);
        fragments.push({
          r: pos.copy(),
          v: p5.Vector.add(vel.copy().mult(0.3), p5.Vector.fromAngle(angle).mult(force)),
          life: random(250, 500),
          col: color(random(200,255), random(150,255), 50)
        });
      }
    }

    function draw() {
      background(2, 2, 6);
      let currentWarp = warpLevels[warpIndex];
      let dt = 0.015; 
      let subSteps = currentWarp > 20 ? 2 : 5; 

      // --- SIMULATION ---
      for (let s = 0; s < currentWarp * subSteps; s++) {
        let stepSize = dt / subSteps;
        if (!isCrashed) {
          if (keyIsDown(87)) v.add(v.copy().normalize().mult(40 * stepSize)); // W
          if (keyIsDown(83)) v.add(v.copy().normalize().mult(-40 * stepSize)); // S
          if (keyIsDown(65)) v.add(createVector(-v.y, v.x).normalize().mult(40 * stepSize)); // A
          if (keyIsDown(68)) v.add(createVector(v.y, -v.x).normalize().mult(40 * stepSize)); // D
          
          let next = rk4Step(r, v, timeSim, stepSize);
          r = next.r; v = next.v; timeSim += stepSize;

          let mP = createVector(cos(timeSim * MOON_ORBIT_SPEED) * MOON_ORBIT_R, sin(timeSim * MOON_ORBIT_SPEED) * MOON_ORBIT_R);
          if (r.mag() < R_PLANET || p5.Vector.dist(r, mP) < MOON_RADIUS) explode(r, v);
          if (r.mag() < R_ATMOS && s % 8 === 0) reentryTrail.push({pos: r.copy(), age: 100});
        }

        // Shrapnel Physics
        for (let i = fragments.length - 1; i >= 0; i--) {
          let f = fragments[i];
          let acc = getAcc(f.r, f.v, timeSim);
          f.v.add(p5.Vector.mult(acc, stepSize));
          f.r.add(p5.Vector.mult(f.v, stepSize));
          f.life -= 0.6;

          // High Energy Bounces
          if (f.r.mag() < R_PLANET) {
            let n = f.r.copy().normalize();
            f.v = f.v.reflect(n).mult(0.85); 
            f.r = n.mult(R_PLANET + 1);
          }
          let fmP = createVector(cos(timeSim * MOON_ORBIT_SPEED) * MOON_ORBIT_R, sin(timeSim * MOON_ORBIT_SPEED) * MOON_ORBIT_R);
          if (p5.Vector.dist(f.r, fmP) < MOON_RADIUS) {
            let n = p5.Vector.sub(f.r, fmP).normalize();
            f.v = f.v.reflect(n).mult(0.85);
            f.r = p5.Vector.add(fmP, n.mult(MOON_RADIUS + 1));
          }
          if (f.life <= 0) fragments.splice(i, 1);
        }
      }
      if (reentryTrail.length > 80) reentryTrail.shift();

      // --- PREDICTION (RELATIVE LOGIC) ---
      if (!isCrashed) {
        traj = [];
        let sR = r.copy(), sV = v.copy(), sT = timeSim;
        for(let i=0; i<2500; i++) {
          let mP = createVector(cos(sT * MOON_ORBIT_SPEED) * MOON_ORBIT_R, sin(sT * MOON_ORBIT_SPEED) * MOON_ORBIT_R);
          let toMoon = p5.Vector.sub(sR, mP);
          let inSOI = toMoon.mag() < MOON_SOI;
          
          let step = inSOI ? 0.1 : 0.6;
          let n = rk4Step(sR, sV, sT, step);
          sR = n.r; sV = n.v; sT += step;
          
          // Store relative position if in SOI
          traj.push({ 
            pos: sR.copy(), 
            relPos: inSOI ? toMoon : null, 
            inSOI: inSOI 
          });
          if (sR.mag() < R_PLANET || p5.Vector.dist(sR, mP) < MOON_RADIUS) break;
        }
      }

      // --- RENDERING ---
      push();
      translate(width/2, height/2); scale(zoom); translate(-camPos.x, -camPos.y);
      
      // World
      noFill(); stroke(255, 10); circle(0,0, MOON_ORBIT_R*2);
      fill(20, 60, 200); noStroke(); circle(0,0, R_PLANET*2);
      fill(40, 100, 255, 20); circle(0,0, R_ATMOS*2);

      // Moon
      let mP = createVector(cos(timeSim * MOON_ORBIT_SPEED) * MOON_ORBIT_R, sin(timeSim * MOON_ORBIT_SPEED) * MOON_ORBIT_R);
      stroke(0, 255, 255, 40); fill(0, 255, 255, 5); circle(mP.x, mP.y, MOON_SOI*2);
      noStroke(); fill(150); circle(mP.x, mP.y, MOON_RADIUS*2);

      // Trajectories
      noFill(); strokeWeight(3/zoom);
      beginShape();
      traj.forEach(p => {
        if (p.inSOI) {
          stroke(0, 200, 255);
          // Anchor the line to the CURRENT moon position
          vertex(mP.x + p.relPos.x, mP.y + p.relPos.y);
        } else {
          stroke(255, 60, 150, 180);
          vertex(p.pos.x, p.pos.y);
        }
      });
      endShape();

      // Debris & Reentry
      fragments.forEach(f => { fill(f.col); rect(f.r.x, f.r.y, 1.5/zoom, 1.5/zoom); });
      reentryTrail.forEach(t => { stroke(255, 150, 0, t.age); strokeWeight(4/zoom); point(t.pos.x, t.pos.y); t.age--; });

      // Vessel
      if (!isCrashed) {
        fill(255, 0, 0); noStroke(); circle(r.x, r.y, 8/zoom);
        let target = (p5.Vector.dist(r, mP) < MOON_SOI) ? mP : r;
        camPos.x = lerp(camPos.x, target.x, 0.1); camPos.y = lerp(camPos.y, target.y, 0.1);
      } else if (fragments.length > 0) {
        camPos.x = lerp(camPos.x, fragments[0].r.x, 0.05); camPos.y = lerp(camPos.y, fragments[0].r.y, 0.05);
      }
      pop();

      // UI
      resetMatrix(); fill(255); noStroke(); textSize(18); textFont('monospace');
      text(`WARP: ${currentWarp}x\nZOOM: ${zoom.toFixed(2)}x\n${isCrashed ? "!! COLLISION DETECTED - 'R' TO RESET !!" : "VEL: " + v.mag().toFixed(1)}`, 30, 40);
    }

    function mouseWheel(e) { zoom = constrain(zoom * (1 - e.delta * 0.001), 0.002, 5); return false; }
    function keyPressed() {
      if (keyCode === 190) warpIndex = min(warpIndex + 1, warpLevels.length - 1);
      if (keyCode === 188) warpIndex = max(warpIndex - 1, 0);
      if (key === 'r' || key === 'R') location.reload();
    }
    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
